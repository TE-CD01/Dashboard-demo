<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Analytics Pro - Updated</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #0b1120; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-active { color: #3b82f6; border-bottom: 3px solid #3b82f6; font-weight: 900; }
        .clickable-row:hover { background: rgba(59, 130, 246, 0.1); cursor: pointer; }
        #popover-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; }
        #popover-overlay.active { display: flex; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="popover-overlay" onclick="hideErrorPopover()">
        <div class="glass max-w-md w-full p-8 rounded-3xl border-t-2 border-red-500" onclick="event.stopPropagation()">
            <div id="popover-content" class="text-sm font-bold text-white"></div>
        </div>
    </div>

    <div id="fail-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="glass w-full max-w-3xl max-h-[80vh] rounded-3xl overflow-hidden flex flex-col">
            <div class="p-6 border-b border-white/10 flex justify-between items-center bg-blue-500/10">
                <h2 id="modal-carrier-id" class="text-xl font-black text-white italic">Details</h2>
                <button onclick="closeModal()" class="text-white text-2xl">&times;</button>
            </div>
            <div class="p-6 overflow-auto">
                <table class="w-full text-left text-xs font-mono">
                    <tbody id="modal-table-body" class="text-slate-300"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-black text-white mb-6 uppercase">Station<span class="text-blue-500">Live</span></h1>
        
        <div class="flex gap-4 mb-6">
            <div id="drop-zone" class="flex-1 h-16 border-2 border-dashed border-slate-700 rounded-2xl flex items-center justify-center cursor-pointer hover:border-blue-500">
                <span id="drop-text" class="text-slate-400 font-bold">Drop Log File Here</span>
                <input type="file" id="file-input" class="hidden" accept=".csv,.txt">
            </div>
        </div>

        <div id="station-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
    </div>

    <script>
        let rawData = [];
        let pieChart = echarts.init(document.createElement('div')); // Placeholder

        // ฟังก์ชันใหม่: สำหรับกดดูรายละเอียดจาก Station Grid
        function showStationData(station, status) {
            const filteredData = rawData.filter(d => 
                d.station === station && (status === 'PASS' ? d.result : !d.result)
            );

            document.getElementById('modal-carrier-id').innerText = `${station} - ${status}`;
            document.getElementById('modal-table-body').innerHTML = filteredData.length ? filteredData.map(d => `
                <tr class="border-b border-white/5">
                    <td class="py-3 text-blue-400 font-bold">${d.carrier}</td>
                    <td class="py-3 text-emerald-400 font-bold">${d.tester}</td>
                    <td class="py-3">${d.seq}</td>
                    <td class="py-3 text-white">${d.title}</td>
                </tr>`).join('') : '<tr><td class="p-8 text-center">No Data</td></tr>';
            
            document.getElementById('fail-modal').classList.remove('hidden');
        }

        // ฟังก์ชันแก้ไข updateUI (ปรับปรุงส่วน grid)
        function updateUI() {
            // ... (โค้ดเดิมของคุณ) ...
            // ส่วนที่ต้องแก้ไขใน loop ของ station-grid:
            document.getElementById('station-grid').innerHTML = Object.keys(stationStats).map(s => {
                const d = stationStats[s];
                return `
                    <div class="glass p-5 rounded-2xl border-t-4 ${d.fail > 0 ? 'border-red-500' : 'border-blue-500'}">
                        <h3 class="text-sm font-black text-white">${s}</h3>
                        <div class="grid grid-cols-2 gap-2 mt-4">
                            <div class="bg-emerald-600 p-2 rounded-xl cursor-pointer hover:bg-emerald-500" onclick="showStationData('${s}', 'PASS')">
                                <p class="text-center font-black">${d.pass}</p>
                            </div>
                            <div class="${d.fail > 0 ? 'bg-red-600' : 'bg-slate-700'} p-2 rounded-xl cursor-pointer hover:bg-red-500" onclick="showStationData('${s}', 'FAIL')">
                                <p class="text-center font-black">${d.fail}</p>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        // โค้ดเดิมที่เหลือ...
        // (เชื่อมต่อ function processFile เข้ากับ drop-zone เหมือนเดิม)
    </script>
</body>
</html>
